<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌿 Smart Nature Weather IoT</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ================= BASE ================= */

body{
margin:0;
padding:25px;
font-family:'Inter',sans-serif;
transition:.8s ease-in-out;
overflow-x:hidden;
}

/* ================= WEATHER THEMES ================= */

/* ☔ RAIN */
body.rainy{
background:linear-gradient(180deg,#0f172a,#1e293b,#334155);
color:#e0f2fe;
}

/* ☀️ SUNNY */
body.sunny{
background:linear-gradient(180deg,#fef9c3,#fde68a,#fca5a5);
color:#14532d;
}

/* 🌫 FOG */
body.fog{
background:linear-gradient(180deg,#e2e8f0,#cbd5e1,#94a3b8);
color:#0f172a;
}

/* ================= RAIN EFFECT ================= */

.rain{
position:fixed;
inset:0;
pointer-events:none;
z-index:-1;
}

.drop{
position:absolute;
width:2px;
height:90px;
background:linear-gradient(to bottom,transparent,#60a5fa);
animation:fall linear infinite;
opacity:.5;
}

@keyframes fall{
0%{transform:translateY(-120%);opacity:0;}
10%{opacity:.6;}
100%{transform:translateY(120vh);opacity:0;}
}

/* ================= PANEL ================= */

.panel{
margin-top:20px;
padding:20px;
border-radius:15px;
backdrop-filter:blur(10px);
background:rgba(255,255,255,.6);
border:1px solid rgba(34,197,94,.3);
transition:.5s;
}

/* ================= GRID ================= */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:20px;
}

.card{
padding:20px;
border-radius:15px;
text-align:center;
background:rgba(255,255,255,.7);
border:1px solid rgba(34,197,94,.2);
transition:.3s;
}

.card:hover{
transform:scale(1.03);
}

.card strong{
font-size:28px;
color:#16a34a;
}

/* ================= BUTTON ================= */

button{
padding:8px 12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.on{background:#22c55e;color:white;}
.off{background:#ef4444;color:white;}

</style>

</head>

<body>

<!-- 🌧 Rain Layer -->
<div class="rain"></div>

<h1>🌿 Smart Nature Weather IoT</h1>
<p>ระบบ IoT</p>

<!-- STATS -->
<div class="grid">

<div class="card"><strong id="deviceCount">0</strong>Devices</div>
<div class="card"><strong id="ledCount">0</strong>LED</div>
<div class="card"><strong id="sensorCount">0</strong>Sensors</div>
<div class="card"><strong id="activeCount">0</strong>Active</div>

</div>

<!-- DEVICE -->
<div class="panel">

<h2>🌱 Device Control</h2>
<table width="100%">
<thead>
<tr>
<th>Device</th>
<th>Type</th>
<th>Status</th>
<th>Control</th>
</tr>
</thead>
<tbody id="device"></tbody>
</table>

</div>

<!-- GRAPH -->
<div class="panel">

<h2>📊 Sensor Graph</h2>
<canvas id="chart"></canvas>

</div>

<script>

const api="/api/proxy";

let dataArr=[];
let labels=[];

/* ================= RAIN SYSTEM ================= */

const rain=document.querySelector(".rain");

function createRain(){

for(let i=0;i<70;i++){

let d=document.createElement("div");
d.className="drop";

d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(0.5+Math.random()*1.5)+"s";

rain.appendChild(d);

}

}

/* ================= WEATHER ENGINE ================= */

function setWeather(mode){

document.body.classList.remove("rainy","sunny","fog");
document.body.classList.add(mode);

}

/* AI WEATHER (SIMULATION) */

function smartWeather(){

let t=20+Math.random()*20;

if(t>32){
setWeather("sunny");
}
else if(t<25){
setWeather("fog");
}
else{
setWeather("rainy");
}

}

/* ================= CHART ================= */

const chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Sensor",
data:dataArr,
borderColor:"#16a34a",
tension:0.4
}]
},
options:{animation:false}
});

/* ================= DEVICE ================= */

async function loadDevice(){

let res=await fetch(api);
let json=await res.json();
let data=Array.isArray(json?.data) ? json.data : Array.isArray(json) ? json : [];

let html="";

data.forEach(x=>{
const name=x.device_name || x.name || "-";
const type=x.device_type || x.type || "-";
const status=x.status || x.state || "OFF";

html+=`
<tr>
<td>${name}</td>
<td>${type}</td>
<td>${status}</td>
<td>
<button class="on" onclick="control('${name}','ON')">ON</button>
<button class="off" onclick="control('${name}','OFF')">OFF</button>
</td>
</tr>
`;

});

document.getElementById("device").innerHTML=html;

deviceCount.innerHTML=data.length;

ledCount.innerHTML=data.filter(x=>String(x.device_type||x.type||"").toUpperCase()=="LED").length;

activeCount.innerHTML=data.filter(x=>String(x.status||x.state||"").toUpperCase()=="ON").length;

}

/* ================= CONTROL ================= */

async function control(name,status){

await fetch(api,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({device_name:name,status:status})
});

loadDevice();

}

/* ================= SENSOR ================= */

async function loadSensor(){

let res=await fetch(api+"?allsensor=1");
let json=await res.json();
let data=Array.isArray(json?.data) ? json.data : Array.isArray(json) ? json : [];

if(data.length>0){

let last=data[0];
let value=Number(last.sensor_value ?? last.value ?? 0);

dataArr.push(value);
labels.push(last.datetime || "");

if(dataArr.length>25){
dataArr.shift();
labels.shift();
}

chart.update();

}

}

/* ================= INIT ================= */

createRain();
setWeather("rainy");

setInterval(smartWeather,8000);

loadDevice();
loadSensor();

setInterval(()=>{
loadDevice();
loadSensor();
},4000);

</script>

</body>
</html>
